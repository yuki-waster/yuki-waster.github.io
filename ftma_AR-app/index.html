<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ARカラーキューブ (MindAR版)</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-text-size-adjust: 100%;
        }

        #status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 500;
            display: flex;
            justify-content: center;
            padding: max(12px, env(safe-area-inset-top)) 16px 12px 16px;
            pointer-events: none;
        }

        #status-text {
            background: rgba(0, 0, 0, 0.55);
            color: #fff;
            font-size: 13px;
            padding: 8px 16px;
            border-radius: 999px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            text-align: center;
            max-width: 90vw;
        }

        #status-text.found {
            background: rgba(34, 139, 87, 0.75);
        }

        #color-panel {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 500;
            padding: 14px 16px max(16px, env(safe-area-inset-bottom)) 16px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.75) 0%, rgba(0, 0, 0, 0) 100%);
        }

        #color-panel .panel-inner {
            max-width: 480px;
            margin: 0 auto;
        }

        #color-panel .panel-label {
            color: #fff;
            font-size: 12px;
            margin-bottom: 8px;
            opacity: 0.85;
        }

        #swatch-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .swatch {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.85);
            padding: 0;
            cursor: pointer;
            transition: transform 0.12s ease;
        }

        .swatch.selected {
            border-color: #fff;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.9);
        }

        #free-color-wrap {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px dashed rgba(255, 255, 255, 0.85);
            position: relative;
        }

        #colorPicker {
            position: absolute;
            top: -8px;
            left: -8px;
            width: 56px;
            height: 56px;
            cursor: pointer;
        }

        #howto {
            position: fixed;
            inset: 0;
            z-index: 800;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            text-align: center;
        }

        #howto h1 {
            font-size: 18px;
            margin-bottom: 12px;
        }

        #howto p {
            font-size: 14px;
            line-height: 1.8;
            opacity: 0.9;
            margin-bottom: 16px;
        }

        .marker-link {
            color: #4DA8DA;
            text-decoration: underline;
            font-size: 14px;
            margin-bottom: 24px;
            display: block;
        }

        #howto button {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 32px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        /* MindARのデフォルトロード画面を非表示化（カスタムUIを優先） */
        .mindar-ui-overlay {
            display: none !important;
        }
    </style>
</head>

<body>

    <div id="howto">
        <h1>ARカラーキューブ (MindAR版)</h1>
        <p>ARエンジンを変更しました。<br>以下のリンクからテスト画像を開き、別の端末の画面に表示した状態で、カメラを向けてください。</p>
        <a class="marker-link"
            href="https://hiukim.github.io/mind-ar-js-doc/assets/images/card-example-5bc062b325c34e7fcebd2109e46a7be7.png"
            target="_blank">【重要】テスト画像を表示</a>
        <button id="howto-start">カメラを起動する</button>
    </div>

    <div id="status-bar">
        <div id="status-text">カメラを初期化中...</div>
    </div>

    <a-scene
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: false; uiLoading: no; uiError: no;"
        color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
            <a-box id="ar-box" position="0 0 0.1" scale="0.6 0.6 0.6"
                material="color: #FF3B30; roughness: 0.6; metalness: 0.1"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            </a-box>
        </a-entity>
    </a-scene>

    <div id="color-panel">
        <div class="panel-inner">
            <div class="panel-label">キューブの色</div>
            <div id="swatch-row">
                <button class="swatch selected" data-color="#FF3B30" style="background:#FF3B30"></button>
                <button class="swatch" data-color="#FF9500" style="background:#FF9500"></button>
                <button class="swatch" data-color="#FFCC00" style="background:#FFCC00"></button>
                <button class="swatch" data-color="#34C759" style="background:#34C759"></button>
                <button class="swatch" data-color="#007AFF" style="background:#007AFF"></button>
                <button class="swatch" data-color="#5856D6" style="background:#5856D6"></button>
                <button class="swatch" data-color="#FFFFFF" style="background:#FFFFFF"></button>
                <button class="swatch" data-color="#1C1C1E" style="background:#1C1C1E"></button>
                <div id="free-color-wrap">
                    <input type="color" id="colorPicker" value="#FF3B30">
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var scene = document.querySelector('a-scene');
            var box = document.getElementById('ar-box');
            var target = document.getElementById('target-entity');
            var statusText = document.getElementById('status-text');
            var howto = document.getElementById('howto');
            var startBtn = document.getElementById('howto-start');
            var swatches = document.querySelectorAll('.swatch');
            var picker = document.getElementById('colorPicker');

            // 開始処理
            startBtn.addEventListener('click', function () {
                howto.style.display = 'none';
                scene.systems["mindar-image-system"].start(); // カメラ明示的起動
            });

            // MindAR イベント処理
            scene.addEventListener('arReady', function () {
                statusText.textContent = 'マーカー画像を探しています';
            });
            scene.addEventListener('arError', function () {
                statusText.textContent = 'カメラの初期化に失敗しました';
            });

            target.addEventListener('targetFound', function () {
                statusText.textContent = 'マーカーを検出しました';
                statusText.classList.add('found');
            });
            target.addEventListener('targetLost', function () {
                statusText.textContent = 'マーカー画像を探しています';
                statusText.classList.remove('found');
            });

            // カラー変更ロジック
            function applyColor(hex) {
                box.setAttribute('material', 'color', hex);
                swatches.forEach(function (el) {
                    el.classList.toggle('selected', el.dataset.color.toLowerCase() === hex.toLowerCase());
                });
                if (picker.value.toLowerCase() !== hex.toLowerCase()) picker.value = hex;
            }

            swatches.forEach(function (btn) {
                btn.addEventListener('click', function () { applyColor(btn.dataset.color); });
            });
            picker.addEventListener('input', function (e) { applyColor(e.target.value); });
        });
    </script>
</body>

</html>
