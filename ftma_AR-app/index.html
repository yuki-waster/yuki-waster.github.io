<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ARカラーキューブ (3DOF軽量版)</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* 背景となる生のカメラ映像 */
        #bg-camera {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            pointer-events: none;
        }

        /* 3D空間の描画（背景を透過） */
        a-scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .a-canvas {
            background-color: transparent !important;
        }

        #status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            justify-content: center;
            padding: max(12px, env(safe-area-inset-top)) 16px 12px 16px;
            pointer-events: none;
        }

        #status-text {
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            font-size: 13px;
            padding: 8px 16px;
            border-radius: 999px;
            text-align: center;
        }

        #status-text.ok {
            background: rgba(34, 139, 87, 0.85);
        }

        #color-panel {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
            padding: 14px 16px max(16px, env(safe-area-inset-bottom)) 16px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0) 100%);
        }

        #color-panel .panel-inner {
            max-width: 480px;
            margin: 0 auto;
        }

        #color-panel .panel-label {
            color: #fff;
            font-size: 12px;
            margin-bottom: 8px;
            opacity: 0.85;
        }

        #swatch-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .swatch {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.85);
            padding: 0;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .swatch.selected {
            border-color: #fff;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.9);
        }

        #free-color-wrap {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px dashed rgba(255, 255, 255, 0.85);
            position: relative;
        }

        #colorPicker {
            position: absolute;
            top: -8px;
            left: -8px;
            width: 56px;
            height: 56px;
            cursor: pointer;
        }

        #howto {
            position: fixed;
            inset: 0;
            z-index: 20;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            text-align: center;
        }

        #howto h1 {
            font-size: 18px;
            margin-bottom: 12px;
        }

        #howto p {
            font-size: 14px;
            line-height: 1.8;
            opacity: 0.9;
            margin-bottom: 16px;
        }

        #howto button {
            background: #fff;
            color: #000;
            border: none;
            padding: 14px 36px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <video id="bg-camera" autoplay playsinline muted></video>

    <div id="howto">
        <h1>ARカラーキューブ (軽量版)</h1>
        <p>画像認識を使用せず、ジャイロセンサーで空間にキューブを配置します。<br>カメラとセンサーの利用を許可してください。</p>
        <button id="howto-start">開始する</button>
    </div>

    <div id="status-bar">
        <div id="status-text">待機中...</div>
    </div>

    <a-scene vr-mode-ui="enabled: false" renderer="alpha: true; antialias: true;" background="transparent">

        <a-entity position="0 1.5 -3">
            <a-box id="ar-box" position="0 0 0" scale="0.8 0.8 0.8"
                material="color: #FF3B30; roughness: 0.6; metalness: 0.1"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            </a-box>
        </a-entity>

        <a-camera position="0 1.6 0" look-controls="enabled: true; magicWindowTrackingEnabled: true;"></a-camera>
    </a-scene>

    <div id="color-panel">
        <div class="panel-inner">
            <div class="panel-label">キューブの色</div>
            <div id="swatch-row">
                <button class="swatch selected" data-color="#FF3B30" style="background:#FF3B30"></button>
                <button class="swatch" data-color="#FF9500" style="background:#FF9500"></button>
                <button class="swatch" data-color="#FFCC00" style="background:#FFCC00"></button>
                <button class="swatch" data-color="#34C759" style="background:#34C759"></button>
                <button class="swatch" data-color="#007AFF" style="background:#007AFF"></button>
                <button class="swatch" data-color="#5856D6" style="background:#5856D6"></button>
                <button class="swatch" data-color="#FFFFFF" style="background:#FFFFFF"></button>
                <button class="swatch" data-color="#1C1C1E" style="background:#1C1C1E"></button>
                <div id="free-color-wrap">
                    <input type="color" id="colorPicker" value="#FF3B30">
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var box = document.getElementById('ar-box');
            var statusText = document.getElementById('status-text');
            var howto = document.getElementById('howto');
            var startBtn = document.getElementById('howto-start');
            var swatches = document.querySelectorAll('.swatch');
            var picker = document.getElementById('colorPicker');
            var video = document.getElementById('bg-camera');

            // 背景カメラ起動ロジック
            function startCamera() {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    statusText.textContent = 'カメラAPIがサポートされていません';
                    return;
                }

                navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false })
                    .then(function (stream) {
                        video.srcObject = stream;
                        // iOS等での自動再生を強制
                        var playPromise = video.play();
                        if (playPromise !== undefined) {
                            playPromise.then(function () {
                                statusText.textContent = '動作中';
                                statusText.classList.add('ok');
                            }).catch(function (error) {
                                statusText.textContent = '再生がブロックされました';
                            });
                        }
                    })
                    .catch(function (err) {
                        statusText.textContent = 'カメラの取得に失敗しました';
                    });
            }

            // 開始ボタン押下時（iOS 13+のジャイロ権限リクエストを含む）
            startBtn.addEventListener('click', function () {
                howto.style.display = 'none';
                statusText.textContent = 'カメラを起動中...';

                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(function (permissionState) {
                            if (permissionState === 'granted') {
                                startCamera();
                            } else {
                                statusText.textContent = 'センサー権限が拒否されました';
                            }
                        })
                        .catch(console.error);
                } else {
                    startCamera();
                }
            });

            // 色変更ロジック
            function applyColor(hex) {
                box.setAttribute('material', 'color', hex);
                swatches.forEach(function (el) {
                    el.classList.toggle('selected', el.dataset.color.toLowerCase() === hex.toLowerCase());
                });
                if (picker.value.toLowerCase() !== hex.toLowerCase()) picker.value = hex;
            }

            swatches.forEach(function (btn) {
                btn.addEventListener('click', function () { applyColor(btn.dataset.color); });
            });
            picker.addEventListener('input', function (e) { applyColor(e.target.value); });
        });
    </script>
</body>

</html>
